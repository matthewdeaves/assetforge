<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Top Navigation Bar -->
  <header class="top-bar">
    <div class="top-bar-inner">
      <div class="top-bar-left">
        <a href="#" class="logo" id="home-btn" title="Return to project list">
          <span class="logo-icon">&#9881;</span>
          <span class="logo-text">Asset Forge</span>
        </a>
        <nav class="breadcrumb" id="breadcrumb">
          <span class="breadcrumb-item breadcrumb-home">Home</span>
        </nav>
      </div>
      <div class="top-bar-right">
        <a href="/evolution.html" class="btn btn-small btn-outline" title="Sprite quality evolution across prompt versions">
          <span class="btn-icon">&#9878;</span> Evolution
        </a>
        <a href="/comparison.html" class="btn btn-small btn-outline" title="Judge calibration history">
          <span class="btn-icon">&#9881;</span> Calibration
        </a>
        <a href="/review.html" class="btn btn-small btn-outline" title="Review & grade sprites">
          <span class="btn-icon">&#9733;</span> Sprite Review
        </a>
        <button class="btn btn-small btn-outline" id="home-btn-alt" title="Back to projects">
          <span class="btn-icon">&#8962;</span> Projects
        </button>
      </div>
    </div>
  </header>

  <!-- Workspace Tab Navigation -->
  <nav class="workspace-nav" id="workspace-nav" hidden>
    <div class="workspace-nav-inner">
      <button class="tab active" data-tab="generate">
        <span class="tab-icon">&#9998;</span>
        <span class="tab-label">Generate</span>
      </button>
      <button class="tab" data-tab="library">
        <span class="tab-icon">&#9638;</span>
        <span class="tab-label">Library</span>
      </button>
      <button class="tab" data-tab="palette">
        <span class="tab-icon">&#9672;</span>
        <span class="tab-label">Palette</span>
      </button>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="app-content" id="app-content">
    <!-- Views are rendered here by JS -->
  </main>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title"></h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay" hidden>
    <div class="loading-spinner">
      <div class="spinner-anvil">
        <div class="anvil-body"></div>
        <div class="anvil-hammer"></div>
      </div>
      <p class="loading-text" id="loading-text">Forging...</p>
    </div>
  </div>

  <!-- Toast Messages -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts (plain JS, loaded in order) -->
  <script src="js/grid-renderer.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components/project-list.js"></script>
  <script src="js/components/sprite-gen.js"></script>
  <script src="js/components/library.js"></script>
  <script src="js/components/palette-editor.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
